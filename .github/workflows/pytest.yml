name: Automated Tests (CI)

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest # GitHub provides a free Ubuntu virtual machine

    steps:
    # 1. Check out the repository code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up the Python environment
    - name: 🐍 Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3. Install project dependencies
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest meshtastic
        # If you have a requirements.txt later, you can uncomment the line below:
        # pip install -r requirements.txt

    # 4. The main event: Run the test suite
    - name: 🧪 Run Tests with Pytest
      run: |
        pytest -v tests/